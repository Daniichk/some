<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Systems | Neural Architecture</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #ffffff;
            --text-muted: #86868b;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            min-height: 100vh;
        }

        /* Liquid Glass Background */
        .liquid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
            z-index: -2;
        }

        .liquid-blob {
            position: fixed;
            width: 600px; height: 600px;
            background: linear-gradient(45deg, #1e3a8a, #581c87);
            filter: blur(160px);
            opacity: 0.15;
            z-index: -1;
            border-radius: 50%;
            animation: drift 25s infinite alternate ease-in-out;
        }

        @keyframes drift {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(30%, 20%); }
        }

        /* Nav */
        nav {
            position: fixed;
            top: 0; width: 100%; height: 50px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(30px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: center;
            z-index: 1000; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase;
        }

        nav span { color: var(--text-muted); cursor: pointer; padding: 0 20px; transition: 0.3s; }
        nav span:hover { color: #fff; }

        /* Root Layout */
        #app-root {
            padding-top: 120px;
            max-width: 1100px;
            margin: 0 auto;
            transition: opacity 0.4s;
        }

        .hero { text-align: center; padding-bottom: 60px; }
        .hero h1 { 
            font-size: clamp(40px, 8vw, 80px); font-weight: 100; letter-spacing: -3px;
            background: linear-gradient(180deg, #fff 0%, #555 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0;
        }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; padding: 20px; }

        .card {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 40px; cursor: pointer; transition: 0.4s;
        }

        .card:hover { border-color: rgba(255,255,255,0.3); transform: translateY(-5px); }
        .card h2 { font-size: 22px; margin: 15px 0 10px 0; font-weight: 400; }
        .card p { color: var(--text-muted); font-size: 14px; line-height: 1.6; }

        /* Fullscreen Player */
        #portal {
            display: none; position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000;
        }

        .portal-header {
            height: 50px; padding: 0 25px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.9);
        }

        iframe { width: 100%; height: calc(100% - 50px); border: none; background: #fff; }

        .btn-exit {
            background: #fff; color: #000; border: none;
            padding: 6px 20px; border-radius: 50px; font-weight: 600; cursor: pointer;
        }
    </style>
</head>
<body>

<div class="liquid-bg"></div>
<div class="liquid-blob"></div>

<nav>
    <span onclick="window.location.reload()">Systems</span> / 
    <span onclick="loadInternalPage('about.txt')">Intelligence</span>
</nav>

<main id="app-root">
    <div class="hero">
        <h1>Autonomous <br>Logic Assets</h1>
        <p style="color:#888;">Secure verification of modular clicker systems.</p>
    </div>

    <div class="grid">
        <!-- Твой Кликер -->
        <div class="card" onclick="runModule('project1.txt', 'Clicker Engine')">
            <span style="font-size:10px; color:#555; letter-spacing:2px;">STABLE V2.0</span>
            <h2>Clicker Protocol</h2>
            <p>Verification of internal economy, businesses, and visual customization modules.</p>
        </div>
    </div>
</main>

<div id="portal">
    <div class="portal-header">
        <span id="session-info" style="font-size: 11px; color: #666;">SESSION: ACTIVE</span>
        <button class="btn-exit" onclick="terminateSession()">Terminate Session</button>
    </div>
    <iframe id="engine-frame" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
</div>

<script>
    /**
     * Продвинутый UTF-8 Декодер (чтобы эмодзи и функции не ломались)
     */
    function safeDecode(str) {
        try {
            return decodeURIComponent(atob(str.trim()).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        } catch (e) {
            return atob(str);
        }
    }

    /**
     * Запуск Игры через srcdoc (самый стабильный метод для сохранений)
     */
    async function runModule(fileName, label) {
        const portal = document.getElementById('portal');
        const frame = document.getElementById('engine-frame');
        
        try {
            const res = await fetch(fileName);
            if (!res.ok) throw new Error("File not found");
            const b64 = await res.text();
            const html = safeDecode(b64);

            // Используем srcdoc вместо Blob, чтобы сохранения работали надежнее
            frame.srcdoc = html;
            
            document.getElementById('session-info').textContent = "MODULE_RUNNING: " + label.toUpperCase();
            portal.style.display = 'block';
        } catch (e) {
            alert("Error initializing logic: " + fileName);
        }
    }

    function terminateSession() {
        const portal = document.getElementById('portal');
        const frame = document.getElementById('engine-frame');
        portal.style.display = 'none';
        frame.srcdoc = ""; // Полная очистка
    }

    async function loadInternalPage(fileName) {
        const root = document.getElementById('app-root');
        try {
            const res = await fetch(fileName);
            const b64 = await res.text();
            root.style.opacity = '0';
            setTimeout(() => {
                root.innerHTML = safeDecode(b64);
                root.style.opacity = '1';
            }, 300);
        } catch (e) { console.error(e); }
    }
</script>

</body>
</html>

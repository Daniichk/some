<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Systems | Neural Architecture</title>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #ffffff;
            --text-muted: #86868b;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg);
            color: var(--accent);
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow: hidden;
            min-height: 100vh;
        }

        /* Liquid Glass Background Effect */
        .liquid-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
            z-index: -2;
        }

        .liquid-blob {
            position: fixed;
            width: 600px; height: 600px;
            background: linear-gradient(45deg, #1e3a8a, #581c87);
            filter: blur(160px);
            opacity: 0.15;
            z-index: -1;
            border-radius: 50%;
            animation: drift 25s infinite alternate ease-in-out;
        }

        @keyframes drift {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(30%, 20%); }
        }

        /* Navigation (Apple/Fortune 500 Style) */
        nav {
            position: fixed;
            top: 0; width: 100%; height: 50px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(30px) saturate(180%);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            font-size: 11px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        nav span { color: var(--text-muted); cursor: pointer; transition: 0.3s; padding: 0 20px; font-weight: 300; }
        nav span:hover { color: #fff; }

        /* Main App Root */
        #app-root {
            padding-top: 120px;
            transition: opacity 0.4s ease-in-out;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Hero UI (OpenAI Style) */
        .hero { text-align: center; padding: 40px 20px 80px 20px; }
        .hero h1 { 
            font-size: clamp(40px, 8vw, 80px); 
            font-weight: 100; 
            letter-spacing: -3px;
            background: linear-gradient(180deg, #fff 0%, #555 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }
        .hero p { color: var(--text-muted); font-size: 18px; margin-top: 20px; font-weight: 200; }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        /* Premium Glass Card */
        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.15, 1, 0.3, 1);
            position: relative;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-8px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .card-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; display: block; font-weight: 600; }
        .card h2 { font-size: 22px; font-weight: 400; margin: 0 0 15px 0; }
        .card p { color: var(--text-muted); font-size: 14px; line-height: 1.6; font-weight: 300; }

        /* Fullscreen Module Portal */
        #portal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000;
        }

        .portal-header {
            height: 60px; padding: 0 30px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid var(--glass-border);
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
        }

        iframe { width: 100%; height: calc(100% - 60px); border: none; background: #fff; }

        .btn-exit {
            background: #fff; color: #000; border: none;
            padding: 8px 24px; border-radius: 50px; font-weight: 600;
            cursor: pointer; font-size: 12px; transition: 0.2s;
        }
        .btn-exit:hover { transform: scale(1.05); }

    </style>
</head>
<body>

<div class="liquid-bg"></div>
<div class="liquid-blob"></div>

<nav>
    <span onclick="window.location.reload()">Systems</span> / 
    <span onclick="loadInternalPage('about.txt')">Intelligence</span> / 
    <span onclick="loadInternalPage('security.txt')">Security</span>
</nav>

<main id="app-root">
    <div class="hero">
        <h1>Autonomous <br>Logic Assets</h1>
        <p>Integrated environment for core system validation and neural modeling.</p>
    </div>

    <div class="grid">
        <!-- Твой Лама-Кликер -->
        <div class="card" onclick="runModule('game1.txt', 'Clicker Protocol 2.0')">
            <span class="card-label">R&D STABLE</span>
            <h2>Neural Clicker</h2>
            <p>Verification of internal economy, businesses, and visual customization modules.</p>
        </div>
    </div>
</main>

<!-- Fullscreen Viewer -->
<div id="portal">
    <div class="portal-header">
        <span id="session-info" style="font-size: 12px; color: #888; font-weight: 300;">INITIALIZING_...</span>
        <button class="btn-exit" onclick="terminateSession()">Terminate Session</button>
    </div>
    <iframe id="engine-frame" sandbox="allow-scripts allow-same-origin allow-forms allow-modals"></iframe>
</div>

<script>
    /**
     * Продвинутый UTF-8 Декодер. 
     * Исправляет работу эмодзи, кириллицы и сложных JS-скриптов.
     */
    function safeDecode(str) {
        try {
            return decodeURIComponent(atob(str.trim()).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
        } catch (e) {
            return atob(str);
        }
    }

    /**
     * Загрузка зашифрованных страниц (about, security)
     */
    async function loadInternalPage(fileName) {
        const root = document.getElementById('app-root');
        root.style.opacity = '0';
        try {
            const res = await fetch(fileName);
            const b64 = await res.text();
            const html = safeDecode(b64);
            
            setTimeout(() => {
                root.innerHTML = html;
                root.style.opacity = '1';
                window.scrollTo(0,0);
            }, 400);
        } catch (e) {
            console.error("Navigation error:", e);
            root.style.opacity = '1';
        }
    }

    /**
     * ГЛАВНАЯ ФУНКЦИЯ ЗАПУСКА КЛИКЕРА.
     * Использует doc.write() для принудительной инициализации панелей TREE и BIZ.
     */
    async function runModule(fileName, label) {
        const portal = document.getElementById('portal');
        const frame = document.getElementById('engine-frame');
        const info = document.getElementById('session-info');

        try {
            const res = await fetch(fileName);
            if (!res.ok) throw new Error("Sync failed");
            const b64 = await res.text();
            const html = safeDecode(b64);

            portal.style.display = 'block';
            document.body.style.overflow = 'hidden';
            info.textContent = "SESSION_ACTIVE: " + label.toUpperCase();

            // Принудительная перезагрузка фрейма
            frame.src = "about:blank";

            setTimeout(() => {
                // Доступ к внутреннему документу фрейма
                const doc = frame.contentWindow.document;
                doc.open();
                // Записываем HTML напрямую, чтобы скрипты игры "увидели" DOM
                doc.write(html);
                doc.close();

                // Посылаем сигнал готовности скриптам игры
                frame.contentWindow.dispatchEvent(new Event('load'));
                frame.focus();
            }, 150);

        } catch (e) {
            alert("System Error: Unable to synchronize assets.");
        }
    }

    function terminateSession() {
        document.getElementById('portal').style.display = 'none';
        document.getElementById('engine-frame').src = '';
        document.body.style.overflow = 'auto';
    }
</script>

</body>
</html>
